name: CodeQL Guvenlik Taramasi

# GitHub'in kod guvenlik analizi (acik/zafiyet tespiti).
# Sonuclar: repo -> Security -> Code scanning alerts altinda gorunur.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1'   # her Pazartesi 03:30 UTC

jobs:
  analyze:
    name: Analiz (JavaScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: CodeQL baslat
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Analizi calistir
        uses: github/codeql-action/analyze@v3
