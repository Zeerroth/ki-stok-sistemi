name: CI/CD

# main'e her push'ta: test -> guvenlik -> (gecerse) VPS'e otomatik deploy
# Pull request'lerde sadece test + guvenlik calisir (deploy yapilmaz).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== 1) TESTLER =====
  test:
    name: Test & Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 24 kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Bagimliliklari kur
        run: npm ci

      - name: Sozdizimi kontrolu (node --check)
        run: |
          for f in server.js db.js sheets.js; do
            echo "kontrol: $f"
            node --check "$f"
          done

      - name: Smoke test (sunucu ayaga kalkiyor mu)
        env:
          APP_PASSWORD: ci-test-sifre
          SECRET: ci-test-secret
          PORT: '3000'
        run: |
          node --disable-warning=ExperimentalWarning server.js &
          SERVER_PID=$!
          sleep 4

          echo "1) Ana sayfa HTTP 200 mu?"
          curl -fsS http://localhost:3000/ > /dev/null

          echo "2) Dogru sifre token donduruyor mu?"
          curl -fsS -X POST http://localhost:3000/api/login \
            -H "Content-Type: application/json" \
            -d '{"sifre":"ci-test-sifre"}' | grep -q '"token"'

          echo "3) Tokensiz erisim 401 mi?"
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/stoklar)
          test "$code" = "401"

          echo "Smoke test BASARILI"
          kill $SERVER_PID

  # ===== 2) GUVENLIK =====
  security:
    name: Guvenlik (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 24 kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Bagimliliklari kur
        run: npm ci

      - name: Bilinen acik taramasi (rapor)
        run: npm audit --audit-level=high || true

      - name: Kritik aciklar deploy'u durdurur
        run: npm audit --audit-level=critical

  # ===== 3) DEPLOY (sadece main'e push'ta, testler gecerse) =====
  deploy:
    name: VPS'e Deploy
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH ile sunucuda guncelle
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            # Etkilesimsiz SSH oturumunda PATH eksik olabilir; pm2'yi npm global bin'inden bul
            export PATH="$(npm prefix -g)/bin:$PATH"
            cd ~/ki-stok-sistemi
            git pull origin main
            npm install --production
            pm2 restart ki-stok
            pm2 save
            echo "Deploy tamamlandi."
