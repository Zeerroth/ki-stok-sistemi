<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<meta name="format-detection" content="telephone=no">
<title>Ki Stok</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" defer></script>
<style>
  :root {
    --bg: #f2f4f7;
    --kart: #ffffff;
    --cizgi: #dde2ea;
    --yazi: #101828;
    --soluk: #667085;
    --yesil: #16a34a;
    --yesil-koyu: #15803d;
    --kirmizi: #dc2626;
    --turuncu: #ea580c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--yazi);
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    min-height: 100vh;
    font-size: 16px;
  }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  input:focus { outline: 3px solid #86efac; outline-offset: 1px; }

  /* ===== UST BASLIK ===== */
  .ust {
    background: var(--kart);
    border-bottom: 1px solid var(--cizgi);
    padding: 12px 16px;
    text-align: center;
    font-size: 18px;
    font-weight: 800;
  }
  .ust .ki { color: var(--yesil-koyu); }

  /* ===== ICERIK ===== */
  .icerik {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 16px calc(90px + env(safe-area-inset-bottom));
    display: none;
    flex-direction: column;
    gap: 14px;
  }
  .icerik.active { display: flex; }

  /* ===== ALT MENU ===== */
  .alt-menu {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--kart);
    border-top: 1px solid var(--cizgi);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .alt-btn {
    flex: 1;
    background: none;
    border: none;
    min-height: 60px;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 12px;
    font-weight: 600;
    color: var(--soluk);
  }
  .alt-btn .ikon { font-size: 24px; line-height: 1.2; }
  .alt-btn.active { color: var(--yesil-koyu); }
  .alt-btn.active .ikon { transform: scale(1.12); }

  /* ===== KART / ADIM ===== */
  .kart {
    background: var(--kart);
    border: 1px solid var(--cizgi);
    border-radius: 14px;
    padding: 14px;
  }
  .adim {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .adim-no {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--yesil);
    color: #fff;
    font-size: 15px;
    flex-shrink: 0;
  }

  /* ===== BARKOD ===== */
  .barkod-input {
    width: 100%;
    border: 2px solid var(--cizgi);
    border-radius: 12px;
    padding: 14px;
    font-size: 22px;
    text-align: center;
    letter-spacing: 2px;
    color: var(--yazi);
    background: #fff;
  }
  .barkod-input::placeholder { letter-spacing: 0; font-size: 17px; color: #98a2b3; }
  .btn-kamera {
    margin-top: 10px;
    width: 100%;
    min-height: 56px;
    background: #dcfce7;
    border: 2px solid var(--yesil);
    color: var(--yesil-koyu);
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
  }
  .btn-kamera:active { background: #bbf7d0; }
  .urun-bulundu {
    margin-top: 10px;
    background: #f0fdf4;
    border: 2px solid #86efac;
    border-radius: 12px;
    padding: 12px 14px;
  }
  .urun-bulundu .ad { font-size: 17px; font-weight: 700; overflow-wrap: anywhere; }
  .urun-bulundu .stok { font-size: 15px; color: var(--soluk); margin-top: 4px; }
  .urun-bulundu .stok b { color: var(--yesil-koyu); font-size: 17px; }
  .urun-bulundu .stok b.yok { color: var(--kirmizi); }
  .urun-yok {
    margin-top: 10px;
    background: #fef2f2;
    border: 2px solid #fca5a5;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 16px;
    font-weight: 600;
    color: #991b1b;
  }

  /* ===== CIKIS TIPI ===== */
  .tip-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .tip-btn {
    border: 2px solid var(--cizgi);
    border-radius: 12px;
    background: #fff;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-size: 14px;
    font-weight: 700;
    color: var(--soluk);
    padding: 8px 4px;
  }
  .tip-btn .emoji { font-size: 26px; }
  .tip-btn .secildi { display: none; font-size: 12px; }
  .tip-btn.secili .secildi { display: block; }
  .tip-btn.secili.t-hediye { border-color: #9333ea; background: #f3e8ff; color: #7e22ce; }
  .tip-btn.secili.t-satis  { border-color: #ea580c; background: #ffedd5; color: #c2410c; }
  .tip-btn.secili.t-depo   { border-color: #2563eb; background: #dbeafe; color: #1d4ed8; }

  /* ===== ADET ===== */
  .adet-satir { display: flex; gap: 10px; align-items: stretch; }
  .adet-btn {
    width: 64px;
    min-height: 56px;
    border: 2px solid var(--cizgi);
    border-radius: 12px;
    background: #fff;
    font-size: 30px;
    font-weight: 700;
    color: var(--yazi);
    flex-shrink: 0;
  }
  .adet-btn:active { background: #eef2f6; }
  .adet-input {
    flex: 1;
    min-width: 0;
    border: 2px solid var(--cizgi);
    border-radius: 12px;
    font-size: 28px;
    font-weight: 800;
    text-align: center;
    color: var(--yazi);
  }
  .not-input {
    width: 100%;
    border: 2px solid var(--cizgi);
    border-radius: 12px;
    padding: 13px 14px;
    font-size: 16px;
    color: var(--yazi);
  }

  /* ===== ONAY BUTONU ===== */
  .btn-onay {
    width: 100%;
    min-height: 64px;
    border: none;
    border-radius: 14px;
    background: var(--yesil);
    color: #fff;
    font-size: 19px;
    font-weight: 800;
    padding: 10px;
  }
  .btn-onay:active { background: var(--yesil-koyu); }
  .btn-onay:disabled { background: #d6dbe3; color: #828a96; }

  /* ===== FLASH (sabit ust bildirim) ===== */
  .flash-alan {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top)); left: 12px; right: 12px;
    max-width: 600px;
    margin: 0 auto;
    z-index: 1200;
  }
  .flash {
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    animation: in 0.15s ease;
  }
  @keyframes in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
  .flash.success { background: #dcfce7; border: 2px solid #4ade80; color: #14532d; }
  .flash.error   { background: #fee2e2; border: 2px solid #f87171; color: #991b1b; }
  .flash > span { min-width: 0; overflow-wrap: anywhere; }
  .flash .geri-al {
    background: #fff;
    border: 2px solid var(--yesil);
    color: var(--yesil-koyu);
    border-radius: 10px;
    min-height: 44px;
    padding: 8px 14px;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ===== BUGUN OZETI ===== */
  .ozet-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .ozet-kart {
    background: var(--kart);
    border: 1px solid var(--cizgi);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
  }
  .ozet-kart .emoji { font-size: 20px; }
  .ozet-kart .sayi { font-size: 24px; font-weight: 800; margin-top: 2px; }
  .ozet-kart .ad { font-size: 12px; color: var(--soluk); margin-top: 2px; }
  .bolum-baslik {
    font-size: 13px;
    font-weight: 700;
    color: var(--soluk);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* ===== ARAMA / FILTRE ===== */
  .arama {
    width: 100%;
    min-height: 50px;
    border: 2px solid var(--cizgi);
    border-radius: 12px;
    padding: 0 14px;
    font-size: 16px;
    color: var(--yazi);
    background: #fff;
  }
  .filtreler { display: flex; gap: 8px; flex-wrap: wrap; }
  .filtre-btn {
    border: 2px solid var(--cizgi);
    border-radius: 999px;
    background: #fff;
    min-height: 44px;
    padding: 0 16px;
    font-size: 15px;
    font-weight: 600;
    color: var(--soluk);
  }
  .filtre-btn.active { border-color: var(--yesil); background: #dcfce7; color: var(--yesil-koyu); }
  .kayit-sayi { font-size: 14px; color: var(--soluk); }

  /* ===== STOK LISTESI ===== */
  .stok-kart {
    background: var(--kart);
    border: 1px solid var(--cizgi);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    width: 100%;
  }
  .stok-kart:active { background: #f8fafc; }
  .stok-bilgi { flex: 1; min-width: 0; }
  .stok-ad { font-size: 16px; font-weight: 600; overflow-wrap: break-word; }
  .stok-alt { font-size: 13px; color: var(--soluk); margin-top: 3px; overflow-wrap: anywhere; }
  .stok-adet { text-align: right; flex-shrink: 0; }
  .stok-adet .n { font-size: 21px; font-weight: 800; }
  .stok-adet .b { font-size: 11px; color: var(--soluk); }
  .n-yesil { color: var(--yesil-koyu); }
  .n-turuncu { color: var(--turuncu); }
  .n-kirmizi { color: var(--kirmizi); }

  /* ===== GECMIS LISTESI ===== */
  .gecmis-kart {
    background: var(--kart);
    border: 1px solid var(--cizgi);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .gecmis-ust { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .tip-chip { border-radius: 999px; padding: 4px 12px; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .c-hediye { background: #f3e8ff; color: #7e22ce; }
  .c-satis  { background: #ffedd5; color: #c2410c; }
  .c-depo   { background: #dbeafe; color: #1d4ed8; }
  .gecmis-tarih { font-size: 13px; color: var(--soluk); }
  .gecmis-urun { font-size: 16px; font-weight: 600; margin-top: 8px; overflow-wrap: break-word; }
  .gecmis-alt { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 8px; }
  .gecmis-detay { font-size: 14px; color: var(--soluk); }
  .gecmis-detay b { color: var(--yazi); }
  .gecmis-not { font-size: 14px; color: var(--soluk); margin-top: 6px; overflow-wrap: break-word; }
  .btn-geri-al {
    border: 2px solid var(--cizgi);
    background: #fff;
    border-radius: 10px;
    min-height: 44px;
    padding: 0 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--soluk);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-geri-al:active { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  .bos { text-align: center; color: var(--soluk); padding: 36px 0; font-size: 16px; }

  /* ===== MENU SAYFASI ===== */
  .menu-btn {
    width: 100%;
    min-height: 58px;
    background: var(--kart);
    border: 1px solid var(--cizgi);
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    font-size: 16px;
    font-weight: 600;
    color: var(--yazi);
    text-align: left;
  }
  .menu-btn:active { background: #f8fafc; }
  .menu-btn .ikon { font-size: 22px; }
  .menu-btn.tehlike { color: var(--kirmizi); border-color: #fecaca; }
  .dosya-sar { position: relative; }
  .dosya-sar input[type=file] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
  .calisan-baslik {
    font-size: 16px;
    font-weight: 800;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== GIRIS ===== */
  .giris-fon {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .giris-kutu {
    background: var(--kart);
    border: 1px solid var(--cizgi);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .giris-kutu .baslik { text-align: center; font-size: 26px; font-weight: 800; }
  .giris-kutu .baslik .ki { color: var(--yesil-koyu); }
  .giris-kutu .alt-yazi { text-align: center; font-size: 13px; color: var(--soluk); }
  .giris-input {
    border: 2px solid var(--cizgi);
    border-radius: 12px;
    padding: 14px;
    font-size: 20px;
    text-align: center;
    letter-spacing: 3px;
    color: var(--yazi);
  }
  .giris-btn {
    background: var(--yesil);
    border: none;
    color: #fff;
    border-radius: 12px;
    min-height: 56px;
    font-size: 18px;
    font-weight: 800;
  }
  .giris-btn:active { background: var(--yesil-koyu); }
  .giris-hata { color: var(--kirmizi); font-size: 15px; text-align: center; min-height: 20px; font-weight: 600; }
  .app-hidden { display: none; }

  /* ===== KAMERA ===== */
  .kamera-fon {
    position: fixed;
    inset: 0;
    background: rgba(8, 11, 18, 0.96);
    z-index: 1100;
    display: none;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    gap: 14px;
  }
  /* margin:auto cifti — sigarsa ortalar, sigmazsa ustten baslar ve scroll edilir */
  .kamera-kutu { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 12px; align-items: center; margin-top: auto; }
  .kamera-baslik { font-size: 18px; font-weight: 800; color: #fff; }
  #kamera-reader { width: 100%; border-radius: 14px; overflow: hidden; }
  #kamera-reader video { border-radius: 14px; max-height: 45vh; object-fit: cover; }
  .kamera-ipucu { font-size: 15px; color: #cbd5e1; text-align: center; }
  .btn-kamera-kapat {
    width: 100%;
    max-width: 440px;
    background: var(--kirmizi);
    border: none;
    color: #fff;
    border-radius: 12px;
    min-height: 58px;
    font-size: 18px;
    font-weight: 800;
    flex-shrink: 0;
    margin-bottom: auto;
  }
</style>
</head>
<body>

<!-- BILDIRIM -->
<div class="flash-alan" id="flash-alan"></div>

<!-- GIRIS -->
<div class="giris-fon" id="login-overlay">
  <div class="giris-kutu">
    <div class="baslik"><span class="ki">Ki</span> Stok</div>
    <div class="alt-yazi">Depo Yönetim Sistemi</div>
    <input class="giris-input" id="login-sifre" type="password" placeholder="Şifre" onkeydown="if(event.key==='Enter')girisYap()">
    <button class="giris-btn" onclick="girisYap()">Giriş Yap</button>
    <div class="giris-hata" id="login-err"></div>
  </div>
</div>

<!-- KAMERA -->
<div class="kamera-fon" id="kamera-overlay">
  <div class="kamera-kutu">
    <div class="kamera-baslik">📷 Barkodu Okutun</div>
    <div id="kamera-reader"></div>
    <div class="kamera-ipucu">Barkodu çerçevenin içine getirin, otomatik okunur</div>
  </div>
  <button class="btn-kamera-kapat" onclick="kameraKapat()">✕ Kapat</button>
</div>

<!-- UYGULAMA -->
<div id="app" class="app-hidden">

<div class="ust"><span class="ki">Ki</span> Stok</div>

<!-- SAYFA: OKUT -->
<div id="page-okut" class="icerik active">

  <div class="kart">
    <div class="adim"><span class="adim-no">1</span> Ürünü okutun</div>
    <input class="barkod-input" id="barkod-input" inputmode="numeric" placeholder="Barkodu yazın..."
           oninput="barkodDegisti()" onkeydown="barkodKeyDown(event)">
    <button class="btn-kamera" onclick="kameraAc()">📷 Kamera ile Tara</button>
    <div id="urun-durum"></div>
  </div>

  <div class="kart">
    <div class="adim"><span class="adim-no">2</span> Çıkış tipini seçin</div>
    <div class="tip-grid">
      <button class="tip-btn t-hediye" id="tip-hediye" onclick="setTip('hediye')">
        <span class="emoji">🎁</span><span>Hediye</span><span class="secildi">✓ Seçili</span>
      </button>
      <button class="tip-btn t-satis" id="tip-satis" onclick="setTip('satis')">
        <span class="emoji">🏪</span><span>Satış</span><span class="secildi">✓ Seçili</span>
      </button>
      <button class="tip-btn t-depo" id="tip-depo" onclick="setTip('depo')">
        <span class="emoji">🏭</span><span>Depo Satışı</span><span class="secildi">✓ Seçili</span>
      </button>
    </div>
  </div>

  <div class="kart">
    <div class="adim"><span class="adim-no">3</span> Kaç adet?</div>
    <div class="adet-satir">
      <button class="adet-btn" onclick="adetDegistir(-1)">−</button>
      <input class="adet-input" id="adet-input" type="number" inputmode="numeric" min="1" value="1">
      <button class="adet-btn" onclick="adetDegistir(1)">+</button>
    </div>
    <div style="margin-top:10px;">
      <input class="not-input" id="not-input" placeholder="Not (isteğe bağlı): müşteri adı, açıklama...">
    </div>
  </div>

  <button class="btn-onay" id="islem-btn" onclick="islemYap()" disabled>Önce ürün okutun</button>

  <div class="bolum-baslik">BUGÜNKÜ ÇIKIŞLAR</div>
  <div class="ozet-grid">
    <div class="ozet-kart">
      <div class="emoji">🎁</div>
      <div class="sayi" style="color:#7e22ce;" id="ozet-hediye">0</div>
      <div class="ad">Hediye · <span id="ozet-hediye-islem">0</span> işlem</div>
    </div>
    <div class="ozet-kart">
      <div class="emoji">🏪</div>
      <div class="sayi" style="color:#c2410c;" id="ozet-satis">0</div>
      <div class="ad">Satış · <span id="ozet-satis-islem">0</span> işlem</div>
    </div>
    <div class="ozet-kart">
      <div class="emoji">🏭</div>
      <div class="sayi" style="color:#1d4ed8;" id="ozet-depo">0</div>
      <div class="ad">Depo · <span id="ozet-depo-islem">0</span> işlem</div>
    </div>
  </div>
</div>

<!-- SAYFA: STOK -->
<div id="page-stok" class="icerik">
  <input class="arama" id="stok-arama" placeholder="🔍 Ürün adı veya barkod arayın..." oninput="renderStok()">
  <div class="kayit-sayi" id="stok-sayi"></div>
  <div id="stok-liste" style="display:flex;flex-direction:column;gap:8px;"></div>
</div>

<!-- SAYFA: GECMIS -->
<div id="page-gecmis" class="icerik">
  <input class="arama" id="gecmis-arama" placeholder="🔍 Ürün veya barkod arayın..." oninput="renderGecmis()">
  <div class="filtreler">
    <button class="filtre-btn active" id="f-hepsi" onclick="setFiltre('hepsi')">Tümü</button>
    <button class="filtre-btn" id="f-hediye" onclick="setFiltre('hediye')">🎁 Hediye</button>
    <button class="filtre-btn" id="f-satis" onclick="setFiltre('satis')">🏪 Satış</button>
    <button class="filtre-btn" id="f-depo" onclick="setFiltre('depo')">🏭 Depo</button>
  </div>
  <div class="kayit-sayi" id="kayit-sayi"></div>
  <div id="gecmis-liste" style="display:flex;flex-direction:column;gap:8px;"></div>
</div>

<!-- SAYFA: MENU -->
<div id="page-menu" class="icerik">
  <div class="bolum-baslik">İŞLEMLER</div>
  <div class="dosya-sar">
    <button class="menu-btn"><span class="ikon">📂</span> Excel ile Stok Listesi Yükle</button>
    <input type="file" accept=".xlsx,.xls" onchange="excelYukle(event)">
  </div>
  <button class="menu-btn" onclick="excelIndir()"><span class="ikon">⬇️</span> Rapor İndir (Excel)</button>
  <button class="menu-btn" id="btn-sync" onclick="sheetsSenkron()"><span class="ikon">🔄</span> Google Sheets'e Gönder</button>

  <div class="bolum-baslik">ÇALIŞAN STOKLARI</div>
  <div id="calisan-liste" style="display:flex;flex-direction:column;gap:8px;"></div>

  <div class="bolum-baslik">HESAP</div>
  <button class="menu-btn tehlike" onclick="cikisOnayla()"><span class="ikon">🚪</span> Çıkış Yap</button>
</div>

<!-- ALT MENU -->
<nav class="alt-menu">
  <button class="alt-btn active" id="nav-okut" onclick="setTab('okut')"><span class="ikon">📷</span>Okut</button>
  <button class="alt-btn" id="nav-stok" onclick="setTab('stok')"><span class="ikon">📦</span>Stok</button>
  <button class="alt-btn" id="nav-gecmis" onclick="setTab('gecmis')"><span class="ikon">📋</span>Geçmiş</button>
  <button class="alt-btn" id="nav-menu" onclick="setTab('menu')"><span class="ikon">☰</span>Menü</button>
</nav>

</div>

<script>
// ===== API KATMANI =====
const API = '/api';
function token() { return localStorage.getItem('ki_token') || ''; }

async function api(yol, opt = {}) {
  const res = await fetch(API + yol, {
    ...opt,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token(),
      ...(opt.headers || {}),
    },
  });
  if (res.status === 401) { cikisYap(); throw new Error('Yetkisiz'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || data.mesaj || 'Hata');
  return data;
}

// ===== DURUM =====
let stoklar = [];
let calisanlar = [];
let islemler = [];
let seciliTip = 'satis';
let filtreTip = 'hepsi';

// Fiziksel klavye/fare var mi? (mobilde otomatik odak klavyeyi acmasin diye)
const FARE = window.matchMedia('(pointer: fine)').matches;

const TIPLER = {
  hediye: { label: 'Hediye',      emoji: '🎁' },
  satis:  { label: 'Satış',       emoji: '🏪' },
  depo:   { label: 'Depo Satışı', emoji: '🏭' },
};

// HTML kacis (urun adi / not gibi serbest metinler icin)
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function sayiYaz(n) { return Number(n).toLocaleString('tr-TR'); }

function tarihYaz(d) {
  const saat = d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  if (d.toDateString() === new Date().toDateString()) return 'Bugün ' + saat;
  return d.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' + saat;
}

// ===== GIRIS =====
async function girisYap() {
  const sifre = document.getElementById('login-sifre').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  try {
    const res = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sifre }),
    });
    if (!res.ok) { err.textContent = 'Şifre hatalı'; return; }
    const data = await res.json();
    localStorage.setItem('ki_token', data.token);
    await uygulamayiBaslat();
  } catch (e) {
    err.textContent = 'Bağlantı hatası';
  }
}

function cikisYap() {
  localStorage.removeItem('ki_token');
  document.getElementById('app').classList.add('app-hidden');
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('login-sifre').value = '';
}

function cikisOnayla() {
  if (confirm('Çıkış yapılsın mı?')) cikisYap();
}

async function uygulamayiBaslat() {
  await veriYukle();
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('app').classList.remove('app-hidden');
  setTip('satis');
  hepsiniCiz();
  if (FARE) document.getElementById('barkod-input').focus();
}

async function veriYukle() {
  const [s, c, i] = await Promise.all([
    api('/stoklar'),
    api('/calisanlar'),
    api('/islemler'),
  ]);
  stoklar = s;
  calisanlar = c;
  islemler = i.map((x) => ({ ...x, not: x.not_metni, tarih: new Date(x.tarih) }));
}

function hepsiniCiz() {
  guncelleOzet();
  renderStok();
  renderGecmis();
  renderCalisan();
  barkodDegisti();
}

// ===== SEKME =====
function setTab(id) {
  ['okut', 'stok', 'gecmis', 'menu'].forEach((t) => {
    document.getElementById('page-' + t).classList.toggle('active', t === id);
    document.getElementById('nav-' + t).classList.toggle('active', t === id);
  });
  window.scrollTo(0, 0);
  if (id === 'okut' && FARE) document.getElementById('barkod-input').focus();
  // Sekme degisince veriyi sessizce tazele (baska cihazdan islem yapilmis olabilir)
  if (id !== 'okut') {
    veriYukle().then(hepsiniCiz).catch(() => {});
  }
}

// ===== CIKIS TIPI =====
function setTip(tip) {
  seciliTip = tip;
  ['hediye', 'satis', 'depo'].forEach((t) => {
    document.getElementById('tip-' + t).classList.toggle('secili', t === tip);
  });
  guncelleBtn();
}

// ===== BARKOD =====
function seciliUrun() {
  const val = document.getElementById('barkod-input').value.trim();
  if (!val) return null;
  return stoklar.find((s) => s.barkod === val) || null;
}

function barkodDegisti() {
  const val = document.getElementById('barkod-input').value.trim();
  const u = seciliUrun();
  const durum = document.getElementById('urun-durum');
  if (u) {
    const stokCls = u.stok === 0 ? 'yok' : '';
    durum.innerHTML = '<div class="urun-bulundu">' +
      '<div class="ad">✅ ' + esc(u.urun) + '</div>' +
      '<div class="stok">Depoda: <b class="' + stokCls + '">' + sayiYaz(u.stok) + ' adet</b>' +
      (u.stok === 0 ? ' — stok tükendi!' : '') + '</div></div>';
  } else if (val.length >= 6) {
    durum.innerHTML = '<div class="urun-yok">❌ Bu barkod stok listesinde yok</div>';
  } else {
    durum.innerHTML = '';
  }
  guncelleBtn();
}

function barkodKeyDown(e) {
  if (e.key === 'Enter') {
    const val = document.getElementById('barkod-input').value.trim();
    if (!val) return;
    if (seciliUrun()) islemYap();
    else showFlash('error', 'Barkod bulunamadı: ' + val.slice(0, 40));
  }
}

// Stok listesinden urune dokununca okutma ekranina sec
function urunSec(barkod) {
  document.getElementById('barkod-input').value = barkod;
  setTab('okut');
  barkodDegisti();
  const u = seciliUrun();
  if (u) showFlash('success', 'Seçildi: ' + u.urun.slice(0, 50));
}

// ===== ADET =====
function adetDegistir(d) {
  const inp = document.getElementById('adet-input');
  inp.value = Math.max(1, (parseInt(inp.value, 10) || 1) + d);
  guncelleBtn();
}

function guncelleBtn() {
  const btn = document.getElementById('islem-btn');
  const val = document.getElementById('barkod-input').value.trim();
  const u = seciliUrun();
  if (!u) {
    btn.disabled = true;
    btn.textContent = val ? 'Ürün bulunamadı' : 'Önce ürün okutun';
    return;
  }
  const adet = Math.max(1, parseInt(document.getElementById('adet-input').value, 10) || 1);
  const t = TIPLER[seciliTip];
  btn.disabled = false;
  btn.textContent = '✓ STOKTAN DÜŞ — ' + adet + ' adet ' + t.label;
}

// ===== ISLEM YAP =====
let islemSuruyor = false;

async function islemYap() {
  if (islemSuruyor) return;
  const u = seciliUrun();
  if (!u) return;
  const barkod = u.barkod;
  const tip = seciliTip;
  const adet = Math.max(1, parseInt(document.getElementById('adet-input').value, 10) || 1);
  const not = document.getElementById('not-input').value.trim();

  islemSuruyor = true;
  const btn = document.getElementById('islem-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Kaydediliyor...';

  try {
    const r = await api('/islem', {
      method: 'POST',
      body: JSON.stringify({ barkod, adet, tip, not }),
    });
    const idx = stoklar.findIndex((s) => s.barkod === barkod);
    if (idx !== -1) stoklar[idx] = { ...stoklar[idx], stok: r.yeniStok };
    islemler.unshift({
      id: r.id, tarih: new Date(), barkod, urun: r.urun,
      tip, adet, not, oncekiStok: r.oncekiStok, yeniStok: r.yeniStok,
    });

    showFlash('success',
      '✓ ' + adet + ' adet düşüldü (' + TIPLER[tip].label + ')',
      r.id);
    document.getElementById('barkod-input').value = '';
    document.getElementById('not-input').value = '';
    document.getElementById('adet-input').value = 1;
    guncelleOzet();
    renderStok();
    renderGecmis();
    barkodDegisti();
    if (FARE) document.getElementById('barkod-input').focus();
  } catch (e) {
    showFlash('error', e.message);
  } finally {
    islemSuruyor = false;
    guncelleBtn();
  }
}

// ===== GERI AL =====
let geriAlSuruyor = false;

async function islemGeriAl(id, sormadan) {
  if (geriAlSuruyor) return;
  if (!sormadan && !confirm('Bu çıkış geri alınsın mı?\nDüşülen adet stoğa geri eklenecek.')) return;
  geriAlSuruyor = true;
  try {
    const r = await api('/islemler/' + id, { method: 'DELETE' });
    const idx = islemler.findIndex((i) => i.id === id);
    if (idx !== -1) islemler.splice(idx, 1);
    const s = stoklar.find((x) => x.barkod === r.barkod);
    if (s) s.stok = r.yeniStok;
    guncelleOzet();
    renderStok();
    renderGecmis();
    barkodDegisti();
    showFlash('success', '↩ Geri alındı: ' + r.adet + ' adet stoğa eklendi');
  } catch (e) {
    showFlash('error', e.message);
  } finally {
    geriAlSuruyor = false;
  }
}

// ===== BUGUN OZETI =====
function guncelleOzet() {
  const bugun = new Date().toDateString();
  ['hediye', 'satis', 'depo'].forEach((tip) => {
    const liste = islemler.filter((i) => i.tip === tip && i.tarih.toDateString() === bugun);
    const toplam = liste.reduce((s, i) => s + i.adet, 0);
    document.getElementById('ozet-' + tip).textContent = sayiYaz(toplam);
    document.getElementById('ozet-' + tip + '-islem').textContent = liste.length;
  });
}

// ===== FLASH =====
let flashTimer = null;
function showFlash(type, msg, geriAlId) {
  const alan = document.getElementById('flash-alan');
  const geriAlBtn = geriAlId
    ? '<button class="geri-al" onclick="islemGeriAl(' + geriAlId + ', true); this.parentElement.remove();">↩ Geri Al</button>'
    : '';
  alan.innerHTML = '<div class="flash ' + type + '"><span>' + esc(msg) + '</span>' + geriAlBtn + '</div>';
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { alan.innerHTML = ''; }, geriAlId ? 6000 : 3500);
}

// ===== GECMIS =====
function setFiltre(tip) {
  filtreTip = tip;
  ['hepsi', 'hediye', 'satis', 'depo'].forEach((t) => {
    document.getElementById('f-' + t).classList.toggle('active', t === tip);
  });
  renderGecmis();
}

function renderGecmis() {
  const arama = document.getElementById('gecmis-arama').value.toLowerCase().trim();
  const liste = islemler.filter((i) =>
    (filtreTip === 'hepsi' || i.tip === filtreTip) &&
    (i.urun.toLowerCase().includes(arama) || i.barkod.includes(arama))
  );
  document.getElementById('kayit-sayi').textContent = liste.length + ' kayıt';
  const el = document.getElementById('gecmis-liste');
  if (!liste.length) {
    el.innerHTML = '<div class="bos">Kayıt yok</div>';
    return;
  }
  const EN_FAZLA = 300;
  el.innerHTML = liste.slice(0, EN_FAZLA).map((i) => {
    const t = TIPLER[i.tip] || { label: i.tip, emoji: '' };
    return '<div class="gecmis-kart">' +
      '<div class="gecmis-ust">' +
        '<span class="tip-chip c-' + esc(i.tip) + '">' + t.emoji + ' ' + esc(t.label) + '</span>' +
        '<span class="gecmis-tarih">' + tarihYaz(i.tarih) + '</span>' +
      '</div>' +
      '<div class="gecmis-urun">' + esc(i.urun) + '</div>' +
      (i.not ? '<div class="gecmis-not">📝 ' + esc(i.not) + '</div>' : '') +
      '<div class="gecmis-alt">' +
        '<span class="gecmis-detay"><b>' + i.adet + ' adet</b> · stok ' + sayiYaz(i.oncekiStok) + ' → ' + sayiYaz(i.yeniStok) + '</span>' +
        '<button class="btn-geri-al" onclick="islemGeriAl(' + Number(i.id) + ')">↩ Geri Al</button>' +
      '</div>' +
    '</div>';
  }).join('') +
  (liste.length > EN_FAZLA ? '<div class="bos">Son ' + EN_FAZLA + ' kayıt gösteriliyor. Tamamı için Rapor İndir.</div>' : '');
}

// ===== STOK =====
function renderStok() {
  const arama = document.getElementById('stok-arama').value.toLowerCase().trim();
  const liste = stoklar.filter((s) =>
    !arama || s.urun.toLowerCase().includes(arama) || s.barkod.includes(arama)
  );
  document.getElementById('stok-sayi').textContent = liste.length + ' ürün';
  const el = document.getElementById('stok-liste');
  if (!liste.length) {
    el.innerHTML = '<div class="bos">Ürün bulunamadı</div>';
    return;
  }
  el.innerHTML = liste.map((s) => {
    const cls = s.stok === 0 ? 'n-kirmizi' : s.stok < 50 ? 'n-turuncu' : 'n-yesil';
    return '<button class="stok-kart" data-barkod="' + esc(s.barkod) + '" onclick="urunSec(this.dataset.barkod)">' +
      '<div class="stok-bilgi">' +
        '<div class="stok-ad">' + esc(s.urun) + '</div>' +
        '<div class="stok-alt">' + esc(s.barkod) + ' · ' + esc(s.kategori) + '</div>' +
      '</div>' +
      '<div class="stok-adet"><div class="n ' + cls + '">' + sayiYaz(s.stok) + '</div><div class="b">adet</div></div>' +
    '</button>';
  }).join('');
}

// ===== CALISAN =====
function renderCalisan() {
  const kisiler = [...new Set(calisanlar.map((c) => c.calisan))];
  const el = document.getElementById('calisan-liste');
  if (!kisiler.length) {
    el.innerHTML = '<div class="bos">Çalışan kaydı yok</div>';
    return;
  }
  el.innerHTML = kisiler.map((ad) => {
    const satirlar = calisanlar.filter((c) => c.calisan === ad).map((c) =>
      '<div class="stok-kart" style="cursor:default;">' +
        '<div class="stok-bilgi">' +
          '<div class="stok-ad">' + esc(c.urun) + '</div>' +
          '<div class="stok-alt">' + esc(c.barkod) + '</div>' +
        '</div>' +
        '<div class="stok-adet"><div class="n ' + (c.stok < 5 ? 'n-kirmizi' : 'n-yesil') + '">' + sayiYaz(c.stok) + '</div><div class="b">adet</div></div>' +
      '</div>'
    ).join('');
    return '<div class="calisan-baslik">👤 ' + esc(ad) + '</div>' + satirlar;
  }).join('');
}

// ===== GOOGLE SHEETS =====
async function sheetsSenkron() {
  const btn = document.getElementById('btn-sync');
  const eski = btn.innerHTML;
  btn.innerHTML = '<span class="ikon">⏳</span> Gönderiliyor...';
  btn.disabled = true;
  try {
    const r = await api('/sync', { method: 'POST' });
    if (r.ok) showFlash('success', '🔄 ' + r.mesaj);
    else showFlash('error', '⚠️ ' + r.mesaj);
  } catch (e) {
    showFlash('error', 'Senkron hatası: ' + e.message);
  } finally {
    btn.innerHTML = eski;
    btn.disabled = false;
  }
}

// ===== KAMERA =====
let qrScanner = null;
let kameraMesgul = false;

async function kameraAc() {
  if (typeof Html5Qrcode === 'undefined') {
    showFlash('error', 'Kamera kütüphanesi yüklenemedi (internet bağlantısını kontrol edin)');
    return;
  }
  const overlay = document.getElementById('kamera-overlay');
  overlay.style.display = 'flex';
  kameraMesgul = false;
  try {
    qrScanner = new Html5Qrcode('kamera-reader', { verbose: false });
    const formatlar = [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
    ];
    await qrScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 280, height: 180 }, formatsToSupport: formatlar },
      (kod) => onKodOkundu(kod),
      () => {}
    );
  } catch (e) {
    const msg = (e && e.message) ? e.message : String(e);
    if (/permission|denied|NotAllowed/i.test(msg)) {
      showFlash('error', 'Kamera izni reddedildi. Tarayıcı ayarlarından izin verin.');
    } else if (/NotFound|no camera/i.test(msg)) {
      showFlash('error', 'Kamera bulunamadı.');
    } else if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      showFlash('error', 'Kamera için HTTPS gerekli (mobilde).');
    } else {
      showFlash('error', 'Kamera açılamadı: ' + msg);
    }
    kameraKapat();
  }
}

async function kameraKapat() {
  const overlay = document.getElementById('kamera-overlay');
  if (qrScanner) {
    try { await qrScanner.stop(); } catch (e) {}
    try { qrScanner.clear(); } catch (e) {}
    qrScanner = null;
  }
  overlay.style.display = 'none';
  kameraMesgul = false;
}

function onKodOkundu(kod) {
  if (kameraMesgul) return; // ayni okumayi iki kez islemeyi engelle
  kameraMesgul = true;
  const val = String(kod).trim();
  document.getElementById('barkod-input').value = val;
  kameraKapat();
  barkodDegisti();
  const u = seciliUrun();
  if (u) showFlash('success', '📷 Okundu: ' + u.urun.slice(0, 50));
  else showFlash('error', 'Bu barkod stok listesinde yok: ' + val.slice(0, 40));
}

// ===== EXCEL YUKLE =====
function excelYukle(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') {
    showFlash('error', 'Excel kütüphanesi yüklenemedi (internet bağlantısını kontrol edin)');
    e.target.value = '';
    return;
  }
  if (!confirm('DİKKAT: Mevcut stok listesinin TAMAMI bu Excel dosyasındaki listeyle değiştirilecek.\n\nDevam edilsin mi?')) {
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = async function (ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws);
      const yeni = data.map((row) => ({
        barkod: String(row['Barkod'] || row['barkod'] || ''),
        urun: row['Urun Adi'] || row['Ürün Adı'] || row['urun'] || row['Urun'] || '',
        stok: Number(row['Stok'] || row['stok'] || 0),
        kategori: row['Kategori'] || row['kategori'] || 'Genel',
      }));
      const r = await api('/stoklar/import', { method: 'POST', body: JSON.stringify(yeni) });
      stoklar = r.stoklar;
      renderStok();
      barkodDegisti();
      showFlash('success', '✓ ' + r.adet + ' ürün yüklendi');
    } catch (err) {
      showFlash('error', 'Yükleme hatası: ' + err.message);
    }
  };
  reader.readAsBinaryString(file);
  e.target.value = '';
}

// ===== EXCEL INDIR =====
function excelIndir() {
  if (typeof XLSX === 'undefined') {
    showFlash('error', 'Excel kütüphanesi yüklenemedi (internet bağlantısını kontrol edin)');
    return;
  }
  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.json_to_sheet(stoklar.map((s) => ({
    'Barkod': s.barkod, 'Urun Adi': s.urun, 'Kategori': s.kategori, 'Stok': s.stok,
  })));
  XLSX.utils.book_append_sheet(wb, ws1, 'Depo Stok');

  if (islemler.length) {
    const ws2 = XLSX.utils.json_to_sheet(islemler.map((i) => ({
      'Tarih': i.tarih.toLocaleString('tr-TR'),
      'Cikis Tipi': (TIPLER[i.tip] || { label: i.tip }).label,
      'Barkod': i.barkod,
      'Urun Adi': i.urun,
      'Adet': i.adet,
      'Onceki Stok': i.oncekiStok,
      'Yeni Stok': i.yeniStok,
      'Not': i.not || '',
    })));
    XLSX.utils.book_append_sheet(wb, ws2, 'Islem Gecmisi');
  }
  XLSX.writeFile(wb, 'ki_stok_rapor.xlsx');
}

document.getElementById('adet-input').addEventListener('input', guncelleBtn);

// Donanim barkod okuyucu (USB/Bluetooth): okut sayfasinda hicbir alan odakli degilken
// tuslama gelirse barkod alanina yonlendir (mobilde otomatik odak verilmedigi icin gerekli)
document.addEventListener('keydown', (e) => {
  if (document.getElementById('app').classList.contains('app-hidden')) return;
  if (!document.getElementById('page-okut').classList.contains('active')) return;
  const aktif = document.activeElement;
  if (aktif && (aktif.tagName === 'INPUT' || aktif.tagName === 'TEXTAREA')) return;
  if (e.key.length === 1) document.getElementById('barkod-input').focus();
});

// ===== BASLANGIC =====
